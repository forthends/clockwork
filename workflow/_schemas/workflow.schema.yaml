# ============================================================
# 需求实例 manifest 结构
# ============================================================
#
# feature_id: string (必填)
#   需求编号，格式: FEAT-<number>
#
# name: string (必填)
#   需求名称
#
# workflow: string (必填)
#   引用的工作流定义名称（对应 _definitions/ 中的 name 字段）
#
# repo: string (可选)
#   关联的代码仓库名称
#
# created_at: date (必填)
#   创建日期，格式: YYYY-MM-DD
#
# current_stage: string (必填)
#   当前所处阶段的 id
#
# stages: map[string, StageState] (必填)
#   各阶段状态追踪，key 为 stage id
#   每个阶段状态:
#     - status: enum[string] (必填)
#         可选值:
#           - pending: 等待开始
#           - in_progress: 进行中
#           - completed: 已完成
#           - blocked: 被阻塞
#     - started_at: string (可选)
#         开始时间，格式: YYYY-MM-DDTHH:MM:SS
#     - completed_at: string (可选)
#         完成时间，格式: YYYY-MM-DDTHH:MM:SS
#     - artifacts: list[string] (可选)
#         已产出的文件列表
#     - validation_passed: boolean (可选)
#         质量闸门是否通过
#     - notes: string (可选)
#         阶段备注，包含校验失败原因等

# -------------------------------------------------------------------
# 示例：完整的 manifest.yaml
# -------------------------------------------------------------------
#
# feature_id: FEAT-001
# name: Backlog 列表删除功能
# workflow: feature-development
# repo: agilehub
# created_at: 2026-04-18
# current_stage: tech_design
#
# stages:
#   requirements:
#     status: completed
#     started_at: 2026-04-18T10:00:00
#     completed_at: 2026-04-18T11:30:00
#     artifacts:
#       - prd.md
#     validation_passed: true
#   tech_design:
#     status: in_progress
#     started_at: 2026-04-18T11:30:00
#   implementation:
#     status: pending
#   testing:
#     status: pending
#   review:
#     status: pending
