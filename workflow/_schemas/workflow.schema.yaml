# Clockwork 工作流定义 Schema
# 所有 workflow/_definitions/ 下的 YAML 文件必须遵循此结构
# 用途：编辑器校验、CLI 验证、代码生成

schema_version: "1.0"

# ============================================================
# 工作流定义 (Workflow Definition)
# ============================================================
#
# 完整的工作流 YAML 文件结构：

# -------------------------------------------------------------------
# name: string (必填)
#   工作流名称，唯一标识
#   建议使用 kebab-case，如 "feature-development", "bugfix"
# -------------------------------------------------------------------
# description: string (必填)
#   工作流描述，说明适用场景
#   第一行是简短摘要，后续行可详细说明
# -------------------------------------------------------------------
# context: list[string] (可选)
#   全局上下文引用，列出所有阶段均可引用的参考文档路径
#   典型用途：项目简介 docs/projects/<repo-name>/overview.md
#   路径中的 <repo-name> 是占位符，运行时会替换
# -------------------------------------------------------------------
# stages: list[Stage] (必填)
#   工作流阶段列表，按执行顺序排列
# -------------------------------------------------------------------

# ============================================================
# 阶段定义 (Stage)
# ============================================================
#
# 每个 stage 包含：

# - id: string (必填)
#     阶段唯一标识，使用 snake_case
#     如: requirements, tech_design, implementation
#
# - name: string (必填)
#     阶段显示名称，供 UI/CLI 显示用
#     如: 需求定义, 技术设计, 代码实现
#
# - agent: string (必填)
#     负责该阶段的 Agent 角色标识
#     对应 agents/<agent>/AGENT.md 中的角色
#     可选值: analyst, pm, developer, tester, reviewer
#
# - stage_type: enum[string] (可选，默认: sequential)
#     阶段执行模式
#     可选值:
#       - sequential: 按序执行，必须等待所有依赖阶段完成
#       - parallel: 可与依赖阶段并行执行
#       - conditional: 满足条件才执行
#
# - parallel_with: list[string] (可选)
#     当 stage_type 为 parallel 时使用
#     声明可并行执行的阶段 id 列表
#     这些阶段不必等待当前阶段完成
#
# - gate: list[string] (可选)
#     进入该阶段的前置条件
#     格式: "<stage>.<field> <operator> <value>"
#     支持操作符: ==, !=, >, <, >=, <=
#     示例: implementation.validation_passed == true
#
# - condition: string (可选)
#     当 stage_type 为 conditional 时使用
#     条件表达式，为真时才执行该阶段
#     格式同 gate
#
# - skills: list[string] (可选)
#     该阶段可调用的技能列表
#     对应 skills/<skill>/SKILL.md
#     如: [create-prd, validate-artifact]
#
# - inputs: list[Input] (可选)
#     上游输入声明
#     当前阶段的产物依赖这些上游产物
#
# - outputs: list[Output] (必填)
#     该阶段的产物声明
#     即使是代码实现等非文档产物，也需要声明

# ============================================================
# 输入定义 (Input)
# ============================================================
#
# - from: string (必填)
#     格式: "<stage_id>.<output_id>"
#     引用上游阶段的产物
#     示例: "requirements.prd", "tech_design.tech-design"

# ============================================================
# 输出定义 (Output)
# ============================================================
#
# - id: string (必填)
#     产物唯一标识，同时作为文件名
#     对于文档产物：id + .md 后缀
#     对于代码：使用 "code" 或具体标识
#
# - template: string (可选)
#     产物模板路径，相对于 workflow/ 目录
#     如: _templates/prd.md
#     如无模板则填 null（但仍需声明输出）
#
# - validation: Validation (可选)
#     质量闸门规则

# ============================================================
# 校验定义 (Validation)
# ============================================================
#
# - required_sections: list[string]
#     产物必须包含的章节标识
#     章节标识使用英文下划线格式
#     如: overview, user_stories, acceptance_criteria
#
# - min_content_length: int (可选)
#     产物正文内容最小字符数
#     用于防止空占位符内容
#
# - custom_rules: list[CustomRule]
#     自定义校验规则

# ============================================================
# 自定义规则 (CustomRule)
# ============================================================
#
# custom_rules 中的每条规则是一个对象，而非简单字符串：
#
# - rule: string (必填)
#     规则描述，用于人类阅读
#
# - check_type: string (必填)
#     检查类型，决定如何验证
#     可选值:
#       - file_exists: 验证文件是否存在
#       - content_pattern: 验证内容匹配正则
#       - git_commit: 验证 git 提交符合规范
#       - branch_naming: 验证分支命名符合规范
#       - reference_exists: 验证引用存在
#       - manual: 需要人工检查
#
# - pattern: string (可选)
#     当 check_type 为 file_exists, content_pattern, git_commit, branch_naming 时使用
#     正则表达式或 glob 模式
#
# - error_message: string (可选)
#     检查失败时的错误提示

# -------------------------------------------------------------------
# 示例：完整的工作流定义
# -------------------------------------------------------------------
#
# name: feature-development
# description: |
#   标准功能开发工作流。
#   适用于新功能的完整开发周期。
#
# context:
#   - docs/projects/<repo-name>/overview.md
#
