name: feature-development-parallel
description: |
  标准功能开发工作流（支持并行）。
  适用于新功能的完整开发周期：需求定义、技术设计可并行推进，代码实现与测试计划可部分并行。

# 阶段执行模式：
# - sequential: 按序执行，必须等待上一阶段完成
# - parallel: 可与依赖阶段并行执行
# - conditional: 满足条件才执行

stages:
  - id: requirements
    name: 需求定义
    agent: pm
    stage_type: sequential
    skills:
      - create-prd
      - validate-artifact
    inputs: []
    outputs:
      - id: prd
        template: _templates/prd.md
        validation:
          required_sections:
            - overview
            - user_stories
            - acceptance_criteria

  - id: tech_design
    name: 技术设计
    agent: developer
    stage_type: parallel
    parallel_with:
      - requirements  # 与需求定义并行（实际场景中可能在 PRD 完成前先做技术预研）
    skills:
      - create-tech-design
      - validate-artifact
    inputs:
      - from: requirements.prd
    outputs:
      - id: tech-design
        template: _templates/tech-design.md
        validation:
          required_sections:
            - architecture
            - api_design
            - data_model

  - id: implementation
    name: 代码实现
    agent: developer
    stage_type: sequential
    skills:
      - validate-artifact
    inputs:
      - from: tech_design.tech-design
    outputs:
      - id: implementation-checklist
        template: _templates/implementation-checklist.md
        validation:
          required_sections:
            - commit_record
            - implementation_summary
          custom_rules:
            - rule: 代码变更必须在 repos/ 中对应的代码仓库内提交
              check_type: git_commit
              pattern: "FEAT-\\d+"
              error_message: 提交信息必须包含需求编号 (FEAT-xxx)
            - rule: 分支命名必须符合规范
              check_type: branch_naming
              pattern: "(feature|bugfix|hotfix)/FEAT-\\d+-.+"
              error_message: 分支名必须为 <type>/FEAT-<id>-<description> 格式
            - rule: 所有实现任务必须标记为完成
              check_type: manual
            - rule: 必须生成 Pull Request/Merge Request
              check_type: manual

  - id: testing
    name: 测试计划
    agent: tester
    stage_type: parallel
    parallel_with:
      - implementation  # 与代码实现并行（测试基于设计编写用例，不等待代码完成）
    skills:
      - create-test-plan
      - validate-artifact
    inputs:
      - from: requirements.prd
      - from: tech_design.tech-design
    outputs:
      - id: test-plan
        template: _templates/test-plan.md
        validation:
          required_sections:
            - test_scope
            - test_cases
            - test_environment

  - id: review
    name: 代码评审
    agent: reviewer
    stage_type: sequential
    skills:
      - validate-artifact
    inputs:
      - from: tech_design.tech-design
      - from: implementation.implementation-checklist
      - from: testing.test-plan  # 评审时参考测试计划
    gate:
      # 代码评审必须满足以下条件：
      - implementation.validation_passed == true
      - testing.validation_passed == true
    outputs:
      - id: review-report
        template: null
        validation:
          custom_rules:
            - rule: 评审意见必须分级标注
              check_type: manual
            - rule: 阻塞级问题必须全部解决后方可通过
              check_type: manual

# 门控规则说明：
# gate 字段定义进入该阶段的前置条件
# 格式："<stage>.<field> <operator> <value>"
# 支持的操作符：==, !=, >, <, >=, <=
# 示例：implementation.validation_passed == true

# 并行执行说明：
# parallel_with 声明可以并行执行的阶段
# 实际并行度由项目规模和资源决定
# CLI 工具不支持真正的并行执行，但会记录依赖关系
