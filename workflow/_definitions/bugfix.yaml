name: bugfix
description: |
  缺陷修复工作流。
  适用于已上线功能的缺陷修复，流程简化：定位问题、修复实现、验证测试。

context:
  - docs/projects/<repo-name>/overview.md  # 项目简介（由 Analyst 生成，各阶段均可引用）

stages:
  - id: bug_analysis
    name: 缺陷分析
    agent: developer
    skills:
      - validate-artifact
    inputs: []
    outputs:
      - id: bug-analysis
        template: _templates/bug-analysis.md
        validation:
          required_sections:
            - bug_overview
            - reproduction_steps
            - root_cause
            - fix_plan
          custom_rules:
            - rule: 必须包含缺陷复现步骤
              check_type: manual
            - rule: 必须包含根因分析
              check_type: manual
            - rule: 必须包含修复方案
              check_type: manual

  - id: fix_implementation
    name: 修复实现
    agent: developer
    skills:
      - validate-artifact
    inputs:
      - from: bug_analysis.bug-analysis
    outputs:
      - id: implementation-checklist
        template: _templates/implementation-checklist.md
        validation:
          required_sections:
            - commit_record
            - implementation_summary
          custom_rules:
            - rule: 代码变更必须在 repos/ 中对应的代码仓库内提交
              check_type: git_commit
              pattern: "FEAT-\\d+|BUG-\\d+"
              error_message: 提交信息必须包含缺陷编号 (BUG-xxx)
            - rule: 分支命名必须符合规范
              check_type: branch_naming
              pattern: "(bugfix|hotfix)/BUG-\\d+-.+"
              error_message: 分支名必须为 <type>/BUG-<id>-<description> 格式
            - rule: 所有实现任务必须标记为完成
              check_type: manual
            - rule: 必须生成 Pull Request/Merge Request
              check_type: manual

  - id: fix_testing
    name: 修复验证
    agent: tester
    skills:
      - create-test-plan
      - validate-artifact
    inputs:
      - from: bug_analysis.bug-analysis
      - from: fix_implementation.implementation-checklist
    outputs:
      - id: test-plan
        template: _templates/test-plan.md
        validation:
          required_sections:
            - test_scope
            - test_cases
          custom_rules:
            - rule: 必须包含缺陷复现验证用例
              check_type: manual
            - rule: 必须包含回归测试用例
              check_type: manual

  - id: fix_review
    name: 修复评审
    agent: reviewer
    skills:
      - validate-artifact
    inputs:
      - from: fix_implementation.implementation-checklist
      - from: bug_analysis.bug-analysis
    outputs:
      - id: review-report
        template: null
        validation:
          custom_rules:
            - rule: 确认修复方案与根因分析一致
              check_type: manual
            - rule: 确认无引入新问题的风险
              check_type: manual
